<footer class="site-footer h-card">
  <div class="wrapper">
    <div class="footer-grid">

      <div class="footer-col">
        <span class="footer-name p-name">{{ site.author.name }}</span>
        <p class="footer-desc">{{ site.description }}</p>
      </div>

      <div class="footer-col">
        <span class="footer-label">Site</span>
        <ul class="footer-links">
          <li><a href="{{ '/' | relative_url }}">Home</a></li>
          <li><a href="{{ '/projects/' | relative_url }}">Projects</a></li>
          <li><a href="{{ '/tutorials/' | relative_url }}">Tutorials</a></li>
          <li><a href="{{ '/logs/' | relative_url }}">Logs</a></li>
          <li><a href="{{ '/about/' | relative_url }}">Author</a></li>
        </ul>
      </div>

      <div class="footer-col">
        <span class="footer-label">Elsewhere</span>
        {%- include social.html -%}
      </div>

    </div>

    <div class="footer-bottom">
      <span>&copy; {{ 'now' | date: "%Y" }} {{ site.author.name }}</span>
    </div>
  </div>
</footer>

<style>
  .site-footer {
    border-top: 1px solid #d8dee4;
    background-color: #f6f8fa;
    padding: 2.5rem 0 1.5rem;
    font-size: 0.9rem;
    color: #57606a;
  }
  .footer-grid {
    display: grid;
    grid-template-columns: 1.4fr 1fr 1fr;
    gap: 40px;
  }
  .footer-name { display: block; font-weight: 700; color: #1f2328; margin-bottom: 8px; }
  .footer-desc { margin: 0; line-height: 1.6; max-width: 40ch; }

  .footer-label {
    display: block;
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: #8c959f;
    margin-bottom: 12px;
  }

  .footer-links { list-style: none; padding: 0; margin: 0; }
  .footer-links li { margin-bottom: 8px; }
  .footer-links a { color: #57606a; text-decoration: none; }
  .footer-links a:hover { color: #1a7f37; text-decoration: none; }

  .footer-bottom {
    margin-top: 2.5rem;
    padding-top: 1.25rem;
    border-top: 1px solid #d8dee4;
    font-size: 0.8rem;
    color: #8c959f;
  }

  @media (max-width: 768px) {
    .footer-grid { grid-template-columns: 1fr; gap: 24px; }
  }
</style>
