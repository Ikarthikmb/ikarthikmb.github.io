<div class="post_navi">
  {% if page.previous %}
  <a class="post_navi-item nav_prev" href="{{ page.previous.url | relative_url }}" title="{{ page.previous.title }}">
    <div class="post_navi-label">&larr; Previous</div>
    <div class="post_navi-title">{{ page.previous.title | truncate: 40 }}</div>
  </a>
  {% else %}
  <span></span>
  {% endif %}

  {% if page.next %}
  <a class="post_navi-item nav_next" href="{{ page.next.url | relative_url }}" title="{{ page.next.title }}">
    <div class="post_navi-label">Next &rarr;</div>
    <div class="post_navi-title">{{ page.next.title | truncate: 40 }}</div>
  </a>
  {% else %}
  <span></span>
  {% endif %}
</div>
