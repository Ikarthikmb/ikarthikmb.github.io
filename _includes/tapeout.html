<div class="tapeout-grid">
  {% for entry in site.data.tapeout_list %}
  <div class="tapeout-entry">
    <a href="{{ entry.link }}" class="tapeout-link-wrapper">
      <div class="tapeout-visual">
        <img src="{{ entry.image | relative_url }}" alt="{{ entry.name }}" class="gds-invert">
      </div>
      <div class="tapeout-info">
        <p class="hw-title">{{ entry.name }}</p>
        <p class="hw-stats">
          {{ entry.process }} | {{ entry.area }} 
          {% if entry.dimensions %}<br><span class="hw-dim">{{ entry.dimensions }}</span>{% endif %}
        </p>
      </div>
    </a>
    <div class="hw-links">
      <a href="{{ entry.link }}" class="hw-src">[ SRC ]</a>
      {% if entry.pdf %}
      <a href="{{ entry.pdf | relative_url }}" class="hw-src">[ PDF ]</a>
      {% endif %}
    </div>
  </div>
  {% endfor %}
</div>

<style>
  .tapeout-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 32px;
    margin: 1.5rem 0;
  }

  .tapeout-entry {
    display: flex;
    flex-direction: column;
  }

  .tapeout-link-wrapper {
    text-decoration: none;
    display: block;
  }

  .tapeout-visual {
    background-color: #0d1117;
    margin-bottom: 12px;
    display: flex;
    justify-content: center;
    align-items: center;
    aspect-ratio: 1 / 1;
    border-radius: 6px;
    overflow: hidden;
    padding: 10px;
    border: 1px solid #d8dee4;
  }

  .gds-invert {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
  }

  .hw-title {
    color: #1f2328;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.9rem;
    margin: 0;
    transition: color 0.2s ease;
  }

  .hw-stats {
    color: #57606a;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    margin: 6px 0 10px 0;
    line-height: 1.4;
  }

  .hw-dim { opacity: 0.8; }

  .hw-links { display: flex; gap: 15px; }

  .hw-src {
    color: #1a7f37;
    text-decoration: none;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem;
    font-weight: 600;
  }

  .tapeout-entry:hover .hw-title { color: #1a7f37; }

  .hw-src:hover { text-decoration: underline; }
</style>
