---
layout: default
---
<article class="page">
  <header class="page-header">
    <h1 class="page-title">{{ page.title | escape }}</h1>
  </header>

  <div class="page-content">
    {{ content }}
  </div>
</article>

<style>
  .page-header {
    margin-bottom: 2rem;
    padding-bottom: 1.25rem;
    border-bottom: 1px solid #d8dee4;
  }

  .page-title {
    font-size: 2rem;
    margin: 0;
    color: #1f2328;
    letter-spacing: -0.01em;
  }

  .page-content {
    color: #1f2328;
    line-height: 1.75;
  }

  .page-content h2, .page-content h3 {
    color: #1f2328;
    margin-top: 2.5rem;
  }

  .page-content a {
    color: #1a7f37;
    text-decoration: none;
    border-bottom: 1px solid rgba(26, 127, 55, 0.35);
  }
  .page-content a:hover { border-bottom-color: #1a7f37; }
</style>
